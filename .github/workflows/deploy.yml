name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_REPOSITORY || 'swarmidentity/resume' }}
  REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/opt/louise-racette' }}
  REMOTE_COMPOSE_FILE: ${{ vars.REMOTE_COMPOSE_FILE || 'docker-compose.yml' }}
  HEALTHCHECK_URLS: ${{ vars.HEALTHCHECK_URLS }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:caddy
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "Docker Compose is not installed on the remote server."
              exit 1
            fi

            cd "${{ env.REMOTE_APP_DIR }}"

            $COMPOSE -f "${{ env.REMOTE_COMPOSE_FILE }}" down
            $COMPOSE -f "${{ env.REMOTE_COMPOSE_FILE }}" pull
            $COMPOSE -f "${{ env.REMOTE_COMPOSE_FILE }}" up -d --remove-orphans