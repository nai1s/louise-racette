name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_REPOSITORY || 'swarmidentity/resume' }}
  REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/opt/louise-racette' }}
  REMOTE_COMPOSE_FILE: ${{ vars.REMOTE_COMPOSE_FILE || 'docker-compose.yml' }}
  HEALTHCHECK_URLS: ${{ vars.HEALTHCHECK_URLS }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:caddy
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "Docker Compose is not installed on the remote server."
              exit 1
            fi

            cd "${{ env.REMOTE_APP_DIR }}"

            $COMPOSE -f "${{ env.REMOTE_COMPOSE_FILE }}" down
            $COMPOSE -f "${{ env.REMOTE_COMPOSE_FILE }}" pull
            $COMPOSE -f "${{ env.REMOTE_COMPOSE_FILE }}" up -d --remove-orphans

  verify:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for services to become ready
        run: sleep 30

      - name: Verify configured URLs return HTTP 200
        env:
          URLS: ${{ env.HEALTHCHECK_URLS }}
        run: |
          set -euo pipefail

          if [ -z "${URLS// }" ]; then
            echo "HEALTHCHECK_URLS is empty. Set it as a repository variable with one URL per line."
            exit 1
          fi

          normalized_urls=$(printf '%s\n' "$URLS" | tr ',' '\n' | sed '/^\s*$/d')

          while IFS= read -r url; do
            [ -z "$url" ] && continue

            echo "Checking $url"
            status_code=$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$url")

            if [ "$status_code" != "200" ]; then
              echo "Health check failed for $url with HTTP $status_code"
              exit 1
            fi
          done <<< "$normalized_urls"
